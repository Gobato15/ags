<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado - AGS Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: 'Outfit', sans-serif;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
        }
        .success-card { 
            background: white; 
            border-radius: 24px; 
            padding: 50px 40px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            max-width: 450px; 
            width: 90%; 
        }
        .success-icon { 
            font-size: 80px; 
            color: #198754; 
            margin-bottom: 25px; 
            animation: bounceIn 0.8s ease;
        }
        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .btn-success {
            background-color: #198754;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-success:hover {
            background-color: #146c43;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(25, 135, 84, 0.3);
        }
    </style>
</head>
<body>
    <div class="success-card">
        <i class="fas fa-check-circle success-icon"></i>
        <h2 class="fw-bold mb-3 text-dark">Pagamento Aprovado!</h2>
        <p class="text-muted mb-4">Seu pedido foi recebido com sucesso e já está sendo preparado com muito carinho pela nossa cozinha.</p>
        <a href="index.html" class="btn btn-success rounded-pill px-4 py-3 fw-bold w-100 fs-6">Voltar ao Cardápio</a>
    </div>
</body>
</html>
