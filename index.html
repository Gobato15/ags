<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css?v=23">
</head>

<body>

    <header class="glass">
        <div class="container position-relative py-2">
            <div class="d-flex justify-content-between align-items-center">
                <div class="logo mb-0 text-start">AGS<span>Delivery</span></div>

                <div class="d-flex align-items-center gap-2">
                    <button id="themeToggle" class="theme-toggle me-2" title="Alternar tema">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="cart-header-btn bg-transparent border-0 position-relative p-2" data-bs-toggle="modal"
                        data-bs-target="#cartModal" aria-label="Abrir Carrinho">
                        <i class="fas fa-shopping-bag text-dark" style="font-size: 1.6rem;"></i>
                        <span
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger shadow-sm"
                            id="cartCount" style="font-size: 0.65rem;">0</span>
                    </button>
                </div>
            </div>

            <div class="search-container w-100 mt-3 pb-1">
                <div class="input-group shadow-sm rounded-pill">
                    <span class="input-group-text bg-white border-0 rounded-start-pill ps-4">
                        <i class="fas fa-search text-muted"></i>
                    </span>
                    <input type="text" id="searchInput" class="form-control bg-white border-0 rounded-end-pill py-2"
                        placeholder="O que você deseja comer hoje?">
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero text-center">
            <h1 class="display-4 fw-bold">Sinta o sabor da <span class="text-gradient">Perfeição</span></h1>
            <p class="lead text-muted mx-auto" style="max-width: 700px;">
                Os melhores ingredientes, selecionados para proporcionar uma experiência gastronômica única na sua casa.
            </p>
        </section>

        <section id="promoCarouselContainer" class="daily-promo-section py-4"></section>

        <section class="categories" id="categoryContainer"></section>

        <section class="grid py-5">
            <div id="menuGrid" class="row g-4"></div>
        </section>
    </main>

    <footer class="bg-dark text-white py-5">
        <div class="container text-center">
            <div class="footer-logo mb-4">AGS<span style="font-weight:300">Delivery</span></div>

            <div class="footer-contact d-flex flex-column align-items-center gap-3 mb-4">
                <a href="https://chat.whatsapp.com/HgplOITiLRwKua9uh7a7Qv" target="_blank"
                    class="footer-btn whatsapp-btn">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>

                <a href="https://www.instagram.com/agsdelivery24/" target="_blank" rel="noopener noreferrer"
                    class="footer-btn instagram-btn">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
            </div>

            <p class="footer-copy mb-0">© 2026 AGS Delivery — Todos os direitos reservados</p>
        </div>
    </footer>


    <!-- Cart Modal -->
    <div class="modal fade" id="cartModal" tabindex="-1" aria-labelledby="cartModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold fs-4" id="cartModalLabel"><i
                            class="fas fa-shopping-bag me-2 text-primary"></i>Seu Carrinho</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="cartItems" class="mb-4">
                        <p class="text-muted text-center my-4 py-4 bg-light rounded-4">Seu carrinho está vazio.</p>
                    </div>

                    <div class="bg-light p-4 rounded-4 mb-0">
                        <div class="d-flex justify-content-between align-items-center mb-0">
                            <h5 class="fw-bold mb-0 text-dark">Subtotal:</h5>
                            <h3 class="fw-bold text-danger mb-0" id="cartTotal">R$ 0,00</h3>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0 pb-4 px-4 d-flex flex-column flex-sm-row gap-2">
                    <button type="button" class="btn btn-light rounded-pill px-4 py-2 w-100 fw-bold border"
                        data-bs-dismiss="modal">Continuar Comprando</button>
                    <button id="btnConfirmarPedido" type="button" class="btn btn-primary rounded-pill px-4 py-2 w-100 fw-bold m-0 shadow-sm"
                         onclick="irParaPagamento()">Confirmar Pedido <i class="fas fa-arrow-right ms-2"></i></button>
                </div>
            </div>
        </div>
    </div>


    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menuData.js?v=17"> </script>
    <script src="script.js?v=30"></script>
</body>

</html><!-- refresh -->
