<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGS Delivery | Cardápio Premium</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="glass">
        <div class="logo">AGS Delivery</div>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="O que você deseja comer hoje?">
        </div>
    </header>

    <main>
        <section class="categories" id="categoryContainer">
            <div class="category-pill active" data-category="all">Todos</div>
            <div class="category-pill" data-category="burgers">Burgers</div>
            <div class="category-pill" data-category="pizzas">Pizzas</div>
            <div class="category-pill" data-category="sushi">Sushi</div>
            <div class="category-pill" data-category="drinks">Bebidas</div>
            <div class="category-pill" data-category="desserts">Sobremesas</div>
        </section>

        <section class="menu-grid" id="menuGrid">
            <!-- Items generated by JS -->
        </section>
    </main>



    <!-- Custom Script -->
    <script src="menuData.js"></script>
    <script src="script.js"></script>
</body>
</html>
